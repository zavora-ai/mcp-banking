<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  </defs>
  <rect width="900" height="480" fill="url(#bg)" rx="12"/>
  <text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">mcp-banking — Architecture</text>

  <!-- MCP Client -->
  <rect x="360" y="55" width="180" height="45" rx="8" fill="#7c3aed" opacity="0.9"/>
  <text x="450" y="83" text-anchor="middle" fill="#fff" font-weight="600">MCP Client (Agent)</text>

  <path d="M450 100 L450 130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#94a3b8"/></marker></defs>

  <!-- Server box -->
  <rect x="150" y="135" width="600" height="145" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="158" text-anchor="middle" fill="#a78bfa" font-weight="bold" font-size="14">mcp-banking (stdio)</text>

  <!-- Tool categories -->
  <rect x="170" y="170" width="100" height="28" rx="5" fill="#1e40af" opacity="0.7"/><text x="220" y="189" text-anchor="middle" fill="#bfdbfe" font-size="11">Accounts (3)</text>
  <rect x="280" y="170" width="120" height="28" rx="5" fill="#7e22ce" opacity="0.6"/><text x="340" y="189" text-anchor="middle" fill="#e9d5ff" font-size="11">Transactions (5)</text>
  <rect x="410" y="170" width="90" height="28" rx="5" fill="#0d9488" opacity="0.7"/><text x="455" y="189" text-anchor="middle" fill="#ccfbf1" font-size="11">Identity (1)</text>
  <rect x="510" y="170" width="110" height="28" rx="5" fill="#334155"/><text x="565" y="189" text-anchor="middle" fill="#94a3b8" font-size="11">Institutions (2)</text>
  <rect x="630" y="170" width="100" height="28" rx="5" fill="#dc2626" opacity="0.6"/><text x="680" y="189" text-anchor="middle" fill="#fecaca" font-size="11">Payments (3)</text>

  <rect x="170" y="205" width="100" height="28" rx="5" fill="#b45309" opacity="0.6"/><text x="220" y="224" text-anchor="middle" fill="#fde68a" font-size="11">Statements (1)</text>

  <!-- BankingBackend trait -->
  <rect x="330" y="240" width="240" height="22" rx="4" fill="#065f46" opacity="0.8"/><text x="450" y="256" text-anchor="middle" fill="#6ee7b7" font-size="11" font-style="italic">BankingBackend trait (15 methods)</text>

  <!-- Arrows to backends -->
  <path d="M450 280 L450 310" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M450 310 L180 355" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
  <path d="M450 310 L450 355" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
  <path d="M450 310 L720 355" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>

  <!-- Backend boxes -->
  <rect x="80" y="355" width="200" height="80" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="180" y="380" text-anchor="middle" fill="#4ade80" font-weight="bold" font-size="13">Plaid</text>
  <text x="180" y="398" text-anchor="middle" fill="#94a3b8" font-size="10">US / Canada / EU</text>
  <text x="180" y="413" text-anchor="middle" fill="#64748b" font-size="10">Client ID + Secret</text>
  <text x="180" y="428" text-anchor="middle" fill="#64748b" font-size="10">sandbox | development | production</text>

  <rect x="350" y="355" width="200" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="380" text-anchor="middle" fill="#fbbf24" font-weight="bold" font-size="13">Mono</text>
  <text x="450" y="398" text-anchor="middle" fill="#94a3b8" font-size="10">Nigeria / Kenya / Ghana / South Africa</text>
  <text x="450" y="413" text-anchor="middle" fill="#64748b" font-size="10">Secret Key + Account ID</text>
  <text x="450" y="428" text-anchor="middle" fill="#64748b" font-size="10">Amounts in kobo/cents (÷100)</text>

  <rect x="620" y="355" width="200" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="720" y="380" text-anchor="middle" fill="#60a5fa" font-weight="bold" font-size="13">Open Banking</text>
  <text x="720" y="398" text-anchor="middle" fill="#94a3b8" font-size="10">UK / EU (PSD2 compliant)</text>
  <text x="720" y="413" text-anchor="middle" fill="#64748b" font-size="10">OAuth2 Bearer Token</text>
  <text x="720" y="428" text-anchor="middle" fill="#64748b" font-size="10">OBP Standard Endpoints</text>

  <!-- Region bar -->
  <rect x="80" y="450" width="740" height="22" rx="4" fill="#1e293b" stroke="#334155"/>
  <text x="450" y="465" text-anchor="middle" fill="#64748b" font-size="10">Coverage: 🇺🇸 US  🇨🇦 Canada  🇬🇧 UK  🇪🇺 EU  🇳🇬 Nigeria  🇰🇪 Kenya  🇬🇭 Ghana  🇿🇦 South Africa</text>
</svg>
